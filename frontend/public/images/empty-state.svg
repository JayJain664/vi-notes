  <rect x="60" y="50" width="70" height="95" fill="none" stroke="#000" stroke-width="1.5" opacity="0.6" rx="4"/>
  
  <!-- Lines on paper -->
  <line x1="65" y1="70" x2="120" y2="70" stroke="#000" stroke-width="1.5" opacity="0.4"/>
  <line x1="65" y1="85" x2="120" y2="85" stroke="#000" stroke-width="1.5" opacity="0.4"/>
  <line x1="65" y1="100" x2="120" y2="100" stroke="#000" stroke-width="1.5" opacity="0.4"/>
  <line x1="65" y1="115" x2="110" y2="115" stroke="#000" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Pen -->
