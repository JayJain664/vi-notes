<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Abstract minimal header design -->
  <!-- Left line decoration -->
  <line x1="0" y1="60" x2="40" y2="60" stroke="#000" stroke-width="2"/>
  
  <!-- Center circle -->
  <circle cx="200" cy="60" r="20" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="200" cy="60" r="12" fill="none" stroke="#000" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Right line decoration -->
  <line x1="360" y1="60" x2="400" y2="60" stroke="#000" stroke-width="2"/>
  
  <!-- Top accent -->
  <path d="M 140 40 Q 200 20 260 40" stroke="#000" stroke-width="1.5" fill="none"/>
  
  <!-- Bottom accent -->
  <path d="M 140 80 Q 200 100 260 80" stroke="#000" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>